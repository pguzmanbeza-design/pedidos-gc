<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffffff">
<title>Despensa Familiar</title>
<link rel="apple-touch-icon" href="manolo.jpeg">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#F5F4F0; --white:#fff; --g1:#f0f0ec; --g2:#e0dfdb; --g3:#c8c7c3;
  --g5:#8a8985; --g7:#4a4945; --g9:#1a1a18;
  --ok:#1A7A4A; --ok-bg:#e8f5ee; --low:#D46000; --low-bg:#fef3e8;
  --empty:#C8002E; --empty-bg:#fce8ed; --ac:#2563EB; --ac-bg:#eff6ff;
  --uber:#06C167; --feria:#2D8B4E; --feria-bg:#e6f4ec;
  --pupe:#7C5CBF; --pupe-bg:#f0ebfa;
  --rs:6px; --sh:0 1px 3px rgba(0,0,0,.05);
  --th:52px; --hh:46px; --ib:50px;
  --sb:env(safe-area-inset-bottom, 0px);
}
html { font-size: 15px; }
body {
  font-family: -apple-system, system-ui, Arial, sans-serif;
  background: var(--bg); color: var(--g9);
  min-height: 100dvh; overflow-x: hidden;
  padding-top: var(--hh);
  padding-bottom: calc(var(--th) + var(--ib) + var(--sb) + 4px);
  -webkit-font-smoothing: antialiased;
}
button, input, select, textarea { font-family: inherit; font-size: inherit; border: none; outline: none; background: none; }
button { cursor: pointer; -webkit-tap-highlight-color: transparent; }
input, select { -webkit-appearance: none; appearance: none; }

/* Header */
.hdr {
  position: fixed; top: 0; left: 0; right: 0; height: var(--hh);
  background: var(--white); display: flex; align-items: center; gap: 7px;
  padding: 0 10px; z-index: 100; border-bottom: 1px solid var(--g2);
}
.hdr-av { width: 28px; height: 28px; border-radius: 50%; background: var(--g1); overflow: hidden; }
.hdr-av img { width: 100%; height: 100%; object-fit: contain; object-position: center top; }
.hdr-t { font-size: 15px; font-weight: 700; flex: 1; }
.hdr-u {
  font-size: 10px; color: var(--ac); font-weight: 700; padding: 4px 8px;
  border-radius: 12px; background: var(--ac-bg); display: flex; align-items: center; gap: 4px;
}
.hdr-u img { width: 20px; height: 20px; border-radius: 50%; object-fit: contain; object-position: center top; background: var(--g1); }

/* Tab Bar */
.tbar {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: calc(var(--th) + var(--sb));
  background: var(--white); display: flex; z-index: 100;
  border-top: 1px solid var(--g2); padding-bottom: var(--sb);
}
.tb {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 1px; font-size: 8px; font-weight: 600;
  color: var(--g5); height: var(--th); position: relative;
}
.tb.on { color: var(--ac); }
.tb svg { width: 18px; height: 18px; fill: currentColor; }
.tbdg {
  position: absolute; top: 2px; right: calc(50% - 14px);
  background: var(--empty); color: #fff; font-size: 7px;
  min-width: 13px; height: 13px; border-radius: 7px;
  display: flex; align-items: center; justify-content: center; padding: 0 3px; font-weight: 700;
}

/* Universal Input Bar */
.ubar {
  position: fixed; bottom: calc(var(--th) + var(--sb));
  left: 0; right: 0; height: var(--ib);
  background: var(--white); border-top: 1px solid var(--g2);
  display: flex; align-items: center; gap: 5px; padding: 0 8px; z-index: 99;
}
.ubar input {
  flex: 1; height: 36px; border-radius: 18px; background: var(--g1);
  padding: 0 12px; font-size: 12px; border: 1px solid var(--g2);
}
.ubar-mic, .ubar-send {
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.ubar-mic { background: var(--g9); color: #fff; }
.ubar-mic.rec { background: var(--empty); animation: mpulse 1s infinite; }
.ubar-mic.proc { background: var(--low); }
.ubar-send { background: var(--ac); color: #fff; }
.ubar-mic svg, .ubar-send svg { width: 16px; height: 16px; fill: currentColor; }
@keyframes mpulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.12)} }
.ubar-status {
  position: fixed; bottom: calc(var(--th) + var(--ib) + var(--sb) + 4px);
  left: 50%; transform: translateX(-50%);
  background: var(--g9); color: #fff; padding: 4px 14px;
  border-radius: 12px; font-size: 10px; font-weight: 600; z-index: 99; display: none;
}
.ubar-status.show { display: block; }

/* Views */
.vw { display: none; padding: 6px 8px 10px; }
.vw.on { display: block; }

/* Summary row */
.sr { display: grid; grid-template-columns: repeat(4,1fr); gap: 4px; margin-bottom: 6px; }
.sc { background: var(--white); border-radius: var(--rs); padding: 5px 3px; text-align: center; box-shadow: var(--sh); }
.sc .n { font-size: 17px; font-weight: 800; line-height: 1; }
.sc .l { font-size: 7px; color: var(--g5); margin-top: 1px; text-transform: uppercase; font-weight: 700; }
.sc-t .n { color: var(--g7); } .sc-o .n { color: var(--ok); }
.sc-l .n { color: var(--low); } .sc-e .n { color: var(--empty); }

/* Search */
.swp { position: relative; margin-bottom: 5px; }
.swp input { width: 100%; height: 32px; background: var(--white); border-radius: 16px; padding: 0 30px 0 10px; font-size: 12px; box-shadow: var(--sh); border: 1px solid var(--g2); }
.swp svg { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; fill: var(--g5); }

/* Product Grid (3 col) */
.pgrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; }
@media (max-width: 359px) { .pgrid { grid-template-columns: repeat(2, 1fr); } }
@media (min-width: 430px) { .pgrid { grid-template-columns: repeat(4, 1fr); } }

.pc {
  background: var(--white); border-radius: var(--rs); padding: 6px;
  box-shadow: var(--sh); display: flex; flex-direction: column; gap: 2px;
  border-left: 3px solid var(--ok); position: relative;
}
.pc.s-low { border-left-color: var(--low); background: var(--low-bg); }
.pc.s-empty { border-left-color: var(--empty); background: var(--empty-bg); }
.pc.s-feria { border-left-color: var(--feria); }
.pc.s-pupe { border-left-color: var(--pupe); background: var(--pupe-bg); }
.pc .pn { font-size: 11px; font-weight: 700; line-height: 1.15; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.pc .pq { font-size: 18px; font-weight: 800; line-height: 1; margin-top: auto; }
.pq.q-ok { color: var(--ok); } .pq.q-low { color: var(--low); } .pq.q-empty { color: var(--empty); }
.pc .pu { font-size: 8px; color: var(--g5); }
.pc .pb { display: flex; gap: 2px; margin-top: 2px; }
.pbtn {
  width: 24px; height: 24px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700; color: var(--g7); background: var(--g1);
}
.pbtn:active { background: var(--g3); }

/* Section headers in grid */
.shdr {
  grid-column: 1 / -1; font-size: 12px; font-weight: 800;
  text-transform: uppercase; letter-spacing: .5px; color: var(--g5);
  padding: 6px 2px 2px; display: flex; align-items: center; gap: 5px;
}
.shdr .sd { width: 7px; height: 7px; border-radius: 50%; }
.shdr.sh-fv { color: var(--feria); } .shdr.sh-fv .sd { background: var(--feria); }
.shdr.sh-pu { color: var(--pupe); } .shdr.sh-pu .sd { background: var(--pupe); }

/* FAB */
.fab {
  position: fixed; bottom: calc(var(--th) + var(--ib) + var(--sb) + 8px);
  right: 10px; width: 44px; height: 44px; border-radius: 50%;
  background: var(--ac); color: #fff; display: flex; align-items: center;
  justify-content: center; font-size: 24px; box-shadow: 0 3px 12px rgba(37,99,235,.35); z-index: 90;
}
.fab:active { transform: scale(.92); }

/* Faltan grid */
.fgrid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 4px; }
@media (min-width: 430px) { .fgrid { grid-template-columns: repeat(3, 1fr); } }
.fc {
  background: var(--white); border-radius: var(--rs); padding: 8px;
  box-shadow: var(--sh); text-align: center; border-top: 3px solid var(--empty);
}
.fc.fc-low { border-top-color: var(--low); }
.fc .fn { font-size: 12px; font-weight: 700; }
.fc .fq { font-size: 10px; color: var(--g5); margin-top: 2px; }
.fc .fb {
  margin-top: 4px; padding: 4px 10px; border-radius: 8px;
  font-size: 10px; font-weight: 700; background: var(--ok); color: #fff; display: inline-block;
}

/* Pedidos */
.pgrp { margin-bottom: 10px; }
.pgt {
  font-size: 11px; font-weight: 700; margin-bottom: 3px; padding: 2px 7px;
  border-radius: var(--rs); display: inline-flex; align-items: center; gap: 5px;
  background: var(--ac-bg); color: var(--ac);
}
.pgt img { width: 16px; height: 16px; border-radius: 50%; object-fit: contain; object-position: center top; background: var(--g1); }
.pdc {
  background: var(--white); border-radius: var(--rs); padding: 6px 8px;
  margin-bottom: 2px; box-shadow: var(--sh); display: flex; align-items: center; gap: 7px;
}
.pdc.done { opacity: .4; }
.pck { width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--g3); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.pck.ckd { background: var(--ok); border-color: var(--ok); color: #fff; }
.pck svg { width: 12px; height: 12px; fill: currentColor; }
.pdt { font-size: 12px; font-weight: 600; } .pdm { font-size: 8px; color: var(--g5); }
.pdx { font-size: 14px; color: var(--g5); padding: 2px; }

/* Compras */
.crb { width: 100%; padding: 10px; border-radius: 10px; font-size: 13px; font-weight: 700; background: var(--uber); color: #fff; text-align: center; margin-bottom: 8px; }
.rup { width: 100%; padding: 10px; border-radius: 10px; font-size: 12px; font-weight: 600; background: var(--g1); color: var(--g7); text-align: center; margin-bottom: 8px; border: 2px dashed var(--g3); }
.cc { background: var(--white); border-radius: var(--rs); padding: 8px; margin-bottom: 4px; box-shadow: var(--sh); }
.cch { display: flex; align-items: center; gap: 5px; margin-bottom: 3px; }
.cts { font-size: 12px; font-weight: 700; flex: 1; }
.ctp { font-size: 8px; font-weight: 700; padding: 2px 6px; border-radius: 6px; }
.tp-a { background: var(--ac-bg); color: var(--ac); } .tp-j { background: var(--low-bg); color: var(--low); }
.cpr { font-size: 10px; color: var(--g7); margin-top: 2px; line-height: 1.4; }
.cpr span { background: var(--g1); padding: 1px 4px; border-radius: 3px; margin-right: 2px; display: inline-block; margin-bottom: 1px; }

/* Config */
.csec { margin-bottom: 14px; }
.csec h3 { font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--g5); margin-bottom: 5px; }
.crow { background: var(--white); border-radius: var(--rs); padding: 8px; margin-bottom: 3px; box-shadow: var(--sh); display: flex; align-items: center; gap: 7px; }
.crow label { flex: 1; font-size: 11px; font-weight: 600; }
.crow input[type="text"], .crow input[type="password"] { flex: 1; height: 32px; border-radius: 6px; background: var(--g1); padding: 0 8px; font-size: 11px; }
.cbtn { width: 100%; padding: 9px; border-radius: var(--rs); font-size: 12px; font-weight: 700; text-align: center; margin-bottom: 3px; }
.cbtn.pri { background: var(--ac); color: #fff; } .cbtn.dan { background: var(--empty-bg); color: var(--empty); } .cbtn.sec { background: var(--g1); color: var(--g7); }
.fchips { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 5px; }
.fchip { padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 600; background: var(--ac-bg); color: var(--ac); display: flex; align-items: center; gap: 4px; }
.fchip img { width: 16px; height: 16px; border-radius: 50%; object-fit: contain; object-position: center top; background: var(--g1); }
.fadd { display: flex; gap: 4px; }
.fadd input { flex: 1; height: 30px; border-radius: 6px; background: var(--g1); padding: 0 8px; font-size: 11px; }
.fadd button { padding: 0 10px; border-radius: 6px; background: var(--ac); color: #fff; font-size: 11px; font-weight: 700; }
.test-res { margin-top: 6px; padding: 8px; border-radius: var(--rs); font-size: 11px; font-weight: 600; word-break: break-all; }
.test-res.t-ok { background: var(--ok-bg); color: var(--ok); }
.test-res.t-err { background: var(--empty-bg); color: var(--empty); }

/* Chips */
.chs { display: flex; gap: 3px; overflow-x: auto; padding: 1px 0 5px; scrollbar-width: none; }
.chs::-webkit-scrollbar { display: none; }
.ch { white-space: nowrap; padding: 3px 9px; border-radius: 10px; font-size: 10px; font-weight: 600; background: var(--white); color: var(--g7); border: 1px solid var(--g2); flex-shrink: 0; }
.ch.on { background: var(--ac); color: #fff; border-color: var(--ac); }

/* Modal */
.mo { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 200; display: none; align-items: flex-end; justify-content: center; }
.mo.show { display: flex; }
.ml { background: var(--white); border-radius: 18px 18px 0 0; width: 100%; max-width: 500px; max-height: 85vh; overflow-y: auto; padding: 14px 12px calc(12px + var(--sb)); }
.ml h2 { font-size: 15px; font-weight: 700; margin-bottom: 10px; text-align: center; }
.mf { margin-bottom: 8px; }
.mf label { display: block; font-size: 10px; font-weight: 600; color: var(--g5); margin-bottom: 2px; text-transform: uppercase; }
.mf input, .mf select { width: 100%; height: 38px; border-radius: 8px; background: var(--g1); padding: 0 10px; font-size: 12px; }
.ma { display: flex; gap: 5px; margin-top: 10px; }
.ma button { flex: 1; height: 40px; border-radius: 8px; font-size: 12px; font-weight: 700; }
.ma .bsv { background: var(--ac); color: #fff; } .ma .bcn { background: var(--g1); color: var(--g7); } .ma .bdl { background: var(--empty-bg); color: var(--empty); }
.cil { margin: 5px 0; max-height: 140px; overflow-y: auto; }
.cir { display: flex; align-items: center; gap: 4px; padding: 4px 6px; background: var(--g1); border-radius: 5px; margin-bottom: 2px; font-size: 11px; }
.cir .cn { flex: 1; font-weight: 600; } .cir .cq { width: 32px; text-align: center; font-weight: 700; } .cir .cx { color: var(--empty); font-size: 13px; }
.car { display: flex; gap: 4px; margin-bottom: 5px; }
.car input { flex: 1; height: 34px; border-radius: 6px; background: var(--g1); padding: 0 8px; font-size: 11px; }
.car input:last-of-type { width: 44px; flex: none; text-align: center; }
.car button { padding: 0 8px; border-radius: 6px; background: var(--uber); color: #fff; font-size: 11px; font-weight: 700; }
.ri { display: flex; align-items: center; gap: 5px; padding: 5px; background: var(--g1); border-radius: 5px; margin-bottom: 3px; }
.ri .rn { flex: 1; font-size: 11px; font-weight: 600; } .ri .rq { font-size: 10px; color: var(--g5); }
.ri select { height: 28px; border-radius: 5px; background: var(--white); padding: 0 4px; font-size: 9px; font-weight: 600; border: 1px solid var(--g2); }
.es { text-align: center; padding: 24px 12px; color: var(--g5); font-size: 12px; }

/* IA response toast */
.ia-toast {
  position: fixed; top: calc(var(--hh) + 4px); left: 8px; right: 8px;
  background: var(--ok-bg); color: var(--ok); padding: 8px 12px;
  border-radius: 10px; font-size: 11px; font-weight: 600; z-index: 150;
  box-shadow: 0 4px 16px rgba(0,0,0,.15); display: none;
}
.ia-toast.show { display: block; }
.ia-toast.err { background: var(--empty-bg); color: var(--empty); }
</style>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
  <div class="hdr-av"><img src="manolo.jpeg" alt=""></div>
  <span class="hdr-t">Despensa Familiar</span>
  <button class="hdr-u" id="curUser">Pablo</button>
</header>

<!-- TAB BAR (5 tabs, no Comando) -->
<nav class="tbar">
  <button class="tb on" data-t="despensa"><svg viewBox="0 0 24 24"><path d="M3 13h1v7c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2v-7h1a1 1 0 0 0 .7-1.7l-9-9a1 1 0 0 0-1.4 0l-9 9A1 1 0 0 0 3 13z"/></svg>Despensa</button>
  <button class="tb" data-t="faltan"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15v-2h2v2h-2zm0-4V7h2v6h-2z"/></svg><span class="tbdg" id="fBdg">0</span>Faltan</button>
  <button class="tb" data-t="pedidos"><svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 3c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm7 13H5v-.23c0-.62.28-1.2.76-1.58C7.47 15.82 9.64 15 12 15s4.53.82 6.24 2.19c.48.38.76.97.76 1.58V19z"/></svg><span class="tbdg" id="pBdg">0</span>Pedidos</button>
  <button class="tb" data-t="compras"><svg viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49A1 1 0 0 0 20.01 4H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>Compras</button>
  <button class="tb" data-t="config"><svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.44.17-.48.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.26.41.48.41h3.84c.24 0 .44-.17.48-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>Config</button>
</nav>

<!-- UNIVERSAL INPUT BAR (always visible, on every tab) -->
<div class="ubar" id="ubar">
  <input type="text" id="uInput" placeholder="Habla o escribe... ej: se acabo la leche">
  <button class="ubar-mic" id="uMic">
    <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
  </button>
  <button class="ubar-send" id="uSend">
    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
  </button>
</div>
<div class="ubar-status" id="uStatus"></div>

<!-- IA Toast (shows response briefly) -->
<div class="ia-toast" id="iaToast"></div>

<!-- VIEW: DESPENSA -->
<div class="vw on" id="v-despensa">
  <div class="sr" id="sumC"></div>
  <div class="swp">
    <input id="srcI" placeholder="Buscar...">
    <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
  </div>
  <div class="pgrid" id="dList"></div>
  <button class="fab" id="addP">+</button>
</div>

<!-- VIEW: FALTAN -->
<div class="vw" id="v-faltan"><div id="fList"></div></div>

<!-- VIEW: PEDIDOS -->
<div class="vw" id="v-pedidos">
  <div class="chs" id="pChs"></div>
  <div id="pList"></div>

function getAv(n) { return AVATARS[n] || ''; }
function dSec(c) { return (c === 'Verduras' || c === 'Frutas') ? 'Frutas y Verduras' : c; }
function getSt(p) { return p.cantidadActual <= 0 ? 'empty' : p.cantidadActual < p.stockMinimo ? 'low' : 'ok'; }
function nid(a) { return a.length ? Math.max.apply(null, a.map(function(x){return x.id;})) + 1 : 1; }
function dCan(c) { return (c === 'Verduras' || c === 'Frutas') ? 'feria' : 'uber_eats'; }

function save() { try { localStorage.setItem('df5', JSON.stringify(S)); } catch(e) {} }
function load() {
  var d = localStorage.getItem('df5');
  if (d) { try { S = JSON.parse(d); if (!S.compras) S.compras = []; } catch(e) { seed(); } }
  else { seed(); }
}

// ===== TABS =====
var activeTab = 'despensa';
function switchTab(t) {
  activeTab = t;
  var tabs = document.querySelectorAll('.tb');
  for (var i = 0; i < tabs.length; i++) tabs[i].classList.toggle('on', tabs[i].getAttribute('data-t') === t);
  var views = document.querySelectorAll('.vw');
  for (var j = 0; j < views.length; j++) views[j].classList.toggle('on', views[j].id === 'v-' + t);
  document.getElementById('addP').style.display = (t === 'despensa') ? '' : 'none';
  document.getElementById('addPed').style.display = (t === 'pedidos') ? '' : 'none';
  renderTab(t);
}
var tabBtns = document.querySelectorAll('.tb');
for (var i = 0; i < tabBtns.length; i++) {
  tabBtns[i].addEventListener('click', function() { switchTab(this.getAttribute('data-t')); });
}

// ===== RENDER DESPENSA =====
var searchQ = '';
function renderDesp() {
  var total = S.productos.length;
  var okN = 0, loN = 0, emN = 0;
  for (var i = 0; i < S.productos.length; i++) {
    var s = getSt(S.productos[i]);
    if (s === 'ok') okN++; else if (s === 'low') loN++; else emN++;
  }
  document.getElementById('sumC').innerHTML =
    '<div class="sc sc-t"><div class="n">' + total + '</div><div class="l">Total</div></div>' +
    '<div class="sc sc-o"><div class="n">' + okN + '</div><div class="l">OK</div></div>' +
    '<div class="sc sc-l"><div class="n">' + loN + '</div><div class="l">Bajo</div></div>' +
    '<div class="sc sc-e"><div class="n">' + emN + '</div><div class="l">Falta</div></div>';

  var ps = S.productos.slice();
  if (searchQ) {
    var q = searchQ.toLowerCase();
    ps = ps.filter(function(p) { return p.nombre.toLowerCase().indexOf(q) >= 0; });
  }

  // Group by section
  var groups = {};
  for (var i = 0; i < ps.length; i++) {
    var sec = dSec(ps[i].categoria);
    if (!groups[sec]) groups[sec] = [];
    groups[sec].push(ps[i]);
  }
  // Sort each group
  var stOrder = {empty: 0, low: 1, ok: 2};
  for (var k in groups) {
    groups[k].sort(function(a, b) { return stOrder[getSt(a)] - stOrder[getSt(b)]; });
  }

  var el = document.getElementById('dList');
  if (!ps.length) { el.innerHTML = '<div class="es" style="grid-column:1/-1">No hay productos</div>'; return; }

  var h = '';
  for (var si = 0; si < SECTIONS.length; si++) {
    var sec = SECTIONS[si];
    if (!groups[sec] || !groups[sec].length) continue;
    var isFV = (sec === 'Frutas y Verduras');
    var isP = (sec === 'Pupe');
    h += '<div class="shdr ' + (isFV ? 'sh-fv' : '') + (isP ? 'sh-pu' : '') + '">' +
         '<span class="sd" style="background:' + (isFV ? 'var(--feria)' : isP ? 'var(--pupe)' : 'var(--g3)') + '"></span>' +
         sec + '</div>';
    for (var pi = 0; pi < groups[sec].length; pi++) {
      var p = groups[sec][pi];
      var s = getSt(p);
      h += '<div class="pc s-' + s + (isP ? ' s-pupe' : '') + (isFV ? ' s-feria' : '') + '" data-id="' + p.id + '">' +
           '<div class="pn">' + p.nombre + '</div>' +
           '<div class="pq q-' + s + '">' + p.cantidadActual + '</div>' +
           '<div class="pu">' + p.unidad + '</div>' +
           '<div class="pb">' +
           '<button class="pbtn" data-a="m" data-id="' + p.id + '">-</button>' +
           '<button class="pbtn" data-a="p" data-id="' + p.id + '">+</button>' +
           '</div></div>';
    }
  }
  el.innerHTML = h;

  // Bind +/- buttons
  var btns = el.querySelectorAll('.pbtn');
  for (var bi = 0; bi < btns.length; bi++) {
    btns[bi].addEventListener('click', function(e) {
      e.stopPropagation();
      var p = S.productos.find(function(x) { return x.id === parseInt(this.getAttribute('data-id')); }.bind(this));
      if (!p) return;
      if (this.getAttribute('data-a') === 'p') p.cantidadActual++;
      else if (p.cantidadActual > 0) p.cantidadActual--;
      p.upd = new Date().toISOString(); p.by = S.config.activeUser;
      save(); renderDesp(); badges();
    });
  }
  // Bind card click
  var cards = el.querySelectorAll('.pc');
  for (var ci = 0; ci < cards.length; ci++) {
    cards[ci].addEventListener('click', function() { openProdModal(parseInt(this.getAttribute('data-id'))); });
  }
  badges();
}

document.getElementById('srcI').addEventListener('input', function() { searchQ = this.value; renderDesp(); });

// ===== RENDER FALTAN =====
function renderFalt() {
  var em = S.productos.filter(function(p) { return getSt(p) === 'empty'; });
  var lo = S.productos.filter(function(p) { return getSt(p) === 'low'; });
  var el = document.getElementById('fList');
  if (!em.length && !lo.length) { el.innerHTML = '<div class="es">Todo OK!</div>'; return; }
  var h = '';
  if (em.length) {
    h += '<div style="font-size:12px;font-weight:700;margin-bottom:4px;padding:3px 7px;border-radius:5px;display:inline-block;background:var(--empty-bg);color:var(--empty)">Por comprar (' + em.length + ')</div>';
    h += '<div class="fgrid">';
    for (var i = 0; i < em.length; i++) {
      h += '<div class="fc"><div class="fn">' + em[i].nombre + '</div><div class="fq">' + em[i].cantidadActual + '/' + em[i].stockMinimo + ' ' + em[i].unidad + '</div><button class="fb" data-r="' + em[i].id + '">Repuesto</button></div>';
    }
    h += '</div>';
  }
  if (lo.length) {
    h += '<div style="font-size:12px;font-weight:700;margin:8px 0 4px;padding:3px 7px;border-radius:5px;display:inline-block;background:var(--low-bg);color:var(--low)">Bajo stock (' + lo.length + ')</div>';
    h += '<div class="fgrid">';
    for (var j = 0; j < lo.length; j++) {
      h += '<div class="fc fc-low"><div class="fn">' + lo[j].nombre + '</div><div class="fq">' + lo[j].cantidadActual + '/' + lo[j].stockMinimo + ' ' + lo[j].unidad + '</div><button class="fb" data-r="' + lo[j].id + '">Repuesto</button></div>';
    }
    h += '</div>';
  }
  el.innerHTML = h;
  var rbs = el.querySelectorAll('.fb');
  for (var ri = 0; ri < rbs.length; ri++) {
    rbs[ri].addEventListener('click', function() {
      var p = S.productos.find(function(x) { return x.id === parseInt(this.getAttribute('data-r')); }.bind(this));
      if (p) { p.cantidadActual = p.stockMinimo; p.upd = new Date().toISOString(); p.by = S.config.activeUser; save(); renderFalt(); badges(); }
    });
  }
}

// ===== RENDER PEDIDOS =====
var pedFilter = 'Todos';
function renderPed() {
  var personas = ['Todos'].concat(S.config.familia);
  var chHtml = '';
  for (var i = 0; i < personas.length; i++) {
    chHtml += '<button class="ch ' + (personas[i] === pedFilter ? 'on' : '') + '" data-p="' + personas[i] + '">' + personas[i] + '</button>';
  }
  document.getElementById('pChs').innerHTML = chHtml;
  var chs = document.querySelectorAll('#pChs .ch');
  for (var ci = 0; ci < chs.length; ci++) {
    chs[ci].addEventListener('click', function() { pedFilter = this.getAttribute('data-p'); renderPed(); });
  }

  var pds = S.pedidos.slice();
  if (pedFilter !== 'Todos') pds = pds.filter(function(p) { return p.por === pedFilter; });

  var el = document.getElementById('pList');
  if (!pds.length) { el.innerHTML = '<div class="es">No hay pedidos</div>'; return; }

  // Group by person
  var g = {};
  for (var i = 0; i < pds.length; i++) {
    if (!g[pds[i].por]) g[pds[i].por] = [];
    g[pds[i].por].push(pds[i]);
  }

  var h = '';
  for (var per in g) {
    var items = g[per];
    items.sort(function(a, b) { return (a.estado === 'comprado' ? 1 : 0) - (b.estado === 'comprado' ? 1 : 0); });
    var av = getAv(per);
    h += '<div class="pgrp"><div class="pgt">' + (av ? '<img src="' + av + '">' : '') + per + '</div>';
    for (var j = 0; j < items.length; j++) {
      var p = items[j];
      var isDone = (p.estado === 'comprado');
      h += '<div class="pdc ' + (isDone ? 'done' : '') + '">' +
           '<button class="pck ' + (isDone ? 'ckd' : '') + '" data-id="' + p.id + '">' +
           (isDone ? '<svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>' : '') +
           '</button>' +
           '<div style="flex:1;min-width:0"><div class="pdt">' + p.texto + (p.cantidad > 1 ? ' x' + p.cantidad : '') + '</div>' +
           '<div class="pdm">' + (p.com || '') + '</div></div>' +
           '<button class="pdx" data-d="' + p.id + '">&times;</button></div>';
    }
    h += '</div>';
  }
  el.innerHTML = h;

  var pks = el.querySelectorAll('.pck');
  for (var pi = 0; pi < pks.length; pi++) {
    pks[pi].addEventListener('click', function() {
      var p = S.pedidos.find(function(x) { return x.id === parseInt(this.getAttribute('data-id')); }.bind(this));
      if (p) { p.estado = (p.estado === 'comprado') ? 'pendiente' : 'comprado'; save(); renderPed(); badges(); }
    });
  }
  var dls = el.querySelectorAll('.pdx');
  for (var di = 0; di < dls.length; di++) {
    dls[di].addEventListener('click', function() {
      var did = parseInt(this.getAttribute('data-d'));
      S.pedidos = S.pedidos.filter(function(x) { return x.id !== did; });
      save(); renderPed(); badges();
    });
  }
}

// ===== RENDER COMPRAS =====
function renderComp() {
  var sorted = S.compras.slice().sort(function(a, b) { return new Date(b.fecha) - new Date(a.fecha); });
  var el = document.getElementById('cList');
  if (!sorted.length) { el.innerHTML = '<div class="es">No hay compras</div>'; return; }
  var h = '';

// ===== VOICE — Web Speech API + Whisper fallback =====
var isRecording = false;
var mediaRec = null;
var chunks = [];
var hasSpeech = !!(window.SpeechRecognition || window.webkitSpeechRecognition);

function startVoice() {
  if (isRecording) { stopVoice(); return; }
  if (hasSpeech) { startWebSpeech(); }
  else { startWhisper(); }
}

function stopVoice() {
  var mic = document.getElementById('uMic');
  var stat = document.getElementById('uStatus');
  if (mic._recognition) { mic._recognition.stop(); mic._recognition = null; }
  if (mediaRec && mediaRec.state === 'recording') { mediaRec.stop(); }
  isRecording = false;
  mic.classList.remove('rec', 'proc');
  stat.classList.remove('show');
}

function startWebSpeech() {
  var SRClass = window.SpeechRecognition || window.webkitSpeechRecognition;
  var rec = new SRClass();
  rec.lang = 'es-CL';
  rec.continuous = false;
  rec.interimResults = false;

  var mic = document.getElementById('uMic');
  var stat = document.getElementById('uStatus');

  rec.onstart = function() {
    isRecording = true;
    mic.classList.add('rec');
    stat.textContent = 'Escuchando...';
    stat.classList.add('show');
  };
  rec.onresult = function(e) {
    var text = e.results[0][0].transcript;
    mic.classList.remove('rec');
    stat.classList.remove('show');
    isRecording = false;
    mic._recognition = null;
    if (text) {
      document.getElementById('uInput').value = text;
      processCommand(text);
    }
  };
  rec.onerror = function(e) {
    mic.classList.remove('rec');
    stat.classList.remove('show');
    isRecording = false;
    mic._recognition = null;
    if (e.error === 'not-allowed') { alert('Permite acceso al microfono'); }
    else { startWhisper(); }
  };
  rec.onend = function() {
    if (isRecording) {
      mic.classList.remove('rec');
      stat.classList.remove('show');
      isRecording = false;
      mic._recognition = null;
    }
  };
  mic._recognition = rec;
  rec.start();
}

function startWhisper() {
  var mic = document.getElementById('uMic');
  var stat = document.getElementById('uStatus');

  navigator.mediaDevices.getUserMedia({ audio: true })
  .then(function(stream) {
    var mime = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/mp4';
    mediaRec = new MediaRecorder(stream, { mimeType: mime });
    chunks = [];
    mediaRec.ondataavailable = function(e) { if (e.data.size > 0) chunks.push(e.data); };
    mediaRec.onstop = function() {
      stream.getTracks().forEach(function(t) { t.stop(); });
      mic.classList.remove('rec');
      mic.classList.add('proc');
      stat.textContent = 'Procesando...';
      stat.classList.add('show');

      var blob = new Blob(chunks, { type: mime });
      var ext = mime.indexOf('webm') >= 0 ? 'webm' : 'm4a';
      var fd = new FormData();
      fd.append('file', blob, 'audio.' + ext);
      fd.append('model', 'whisper-1');
      fd.append('language', 'es');

      fetch('https://api.openai.com/v1/audio/transcriptions', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + S.config.apiKey },
        body: fd
      })
      .then(function(r) { return r.json(); })
      .then(function(d) {
        mic.classList.remove('proc');
        stat.classList.remove('show');
        isRecording = false;
        if (d.text) {
          document.getElementById('uInput').value = d.text;
          processCommand(d.text);
        }
      })
      .catch(function() {
        mic.classList.remove('proc');
        stat.classList.remove('show');
        isRecording = false;
      });
    };
    mediaRec.start();
    isRecording = true;
    mic.classList.add('rec');
    stat.textContent = 'Escuchando...';
    stat.classList.add('show');
  })
  .catch(function() { alert('Permite acceso al microfono en configuracion del navegador.'); });
}

document.getElementById('uMic').addEventListener('click', startVoice);

// ===== OPENAI COMMAND PROCESSING =====
function processCommand(text) {
  var key = S.config.apiKey;
  if (!key) {
    flashToast('Configura API Key en Config', true);
    return;
  }

  showToast('Procesando: "' + text + '"...');

  var inv = S.productos.map(function(p) {
    return p.nombre + '(' + p.categoria + '):' + p.cantidadActual + p.unidad + ',min' + p.stockMinimo;
  }).join('; ');

  var sysMsg = 'Eres asistente de despensa familiar chilena. ' +
    'Familia: ' + S.config.familia.join(',') + '. ' +
    'Usuario activo: ' + S.config.activeUser + '. ' +
    'Pupe es intolerante a lactosa (productos sin lacteos). ' +
    'Inventario: ' + inv + '. ' +
    'Verduras y frutas se compran en feria. Todo lo demas por Uber Eats. ' +
    'Responde SOLO JSON valido: {"acciones":[...],"respuesta":"texto corto"} ' +
    'Tipos de accion: ' +
    '"actualizar" con campos producto y cantidad (si dicen se acabo = 0). ' +
    '"pedido" con campos texto, solicitadoPor, cantidad, comentario. ' +
    '"crear" con campos nombre, categoria, unidad, cantidad, stockMinimo, canal. ' +
    'Si mencionan un nombre de la familia, asignar a esa persona. Si no, asignar a ' + S.config.activeUser + '. ' +
    'NO uses markdown, solo JSON puro.';

  fetch('https://api.openai.com/v1/chat/completions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + key },
    body: JSON.stringify({
      model: 'gpt-4o-mini',
      messages: [
        { role: 'system', content: sysMsg },
        { role: 'user', content: text }
      ],
      temperature: 0.3,
      max_tokens: 600
    })
  })
  .then(function(r) {
    if (!r.ok) {
      return r.json().then(function(data) {
        var msg = data.error ? data.error.message : 'Error ' + r.status;
        if (r.status === 401) msg = 'API Key invalida';
        if (r.status === 429) msg = 'Sin saldo en OpenAI. Agrega credito en platform.openai.com';
        flashToast('Error: ' + msg, true);
        throw new Error(msg);
      });
    }
    return r.json();
  })
  .then(function(data) {
    if (!data || !data.choices) return;
    var raw = data.choices[0].message.content;
    var clean = raw.replace(/```json?\n?/g, '').replace(/```/g, '').trim();
    var parsed;
    try { parsed = JSON.parse(clean); }
    catch(e) { flashToast('No pude interpretar la respuesta', true); return; }

    var msgs = [];
    if (parsed.acciones) {
      for (var i = 0; i < parsed.acciones.length; i++) {
        var a = parsed.acciones[i];
        if (a.tipo === 'actualizar') {
          var p = S.productos.find(function(x) { return x.nombre.toLowerCase() === (a.producto || '').toLowerCase(); });
          if (p) {
            p.cantidadActual = Math.max(0, a.cantidad);
            p.upd = new Date().toISOString();
            p.by = S.config.activeUser;
            msgs.push(p.nombre + ' -> ' + a.cantidad);
          } else { msgs.push('"' + a.producto + '" no encontrado'); }
        }
        else if (a.tipo === 'pedido') {
          S.pedidos.push({
            id: nid(S.pedidos), texto: a.texto, cantidad: a.cantidad || 1,
            por: a.solicitadoPor || S.config.activeUser,
            com: a.comentario || '', fecha: new Date().toISOString(), estado: 'pendiente'
          });
          msgs.push('Pedido: ' + a.texto);
        }
        else if (a.tipo === 'crear') {
          S.productos.push({
            id: nid(S.productos), nombre: a.nombre,
            categoria: a.categoria || 'Otro', unidad: a.unidad || 'un',
            cantidadActual: a.cantidad || 0, stockMinimo: a.stockMinimo || 1,
            canal: a.canal || dCan(a.categoria || 'Otro'),
            upd: new Date().toISOString(), by: S.config.activeUser
          });
          msgs.push('Nuevo: ' + a.nombre);
        }
      }
    }
    save(); badges(); renderTab(activeTab);

    var toastMsg = parsed.respuesta || 'Listo!';
    if (msgs.length) toastMsg += ' | ' + msgs.join(', ');
    flashToast(toastMsg, false);
  })
  .catch(function(e) {
    // Error already handled above unless it's a network error
    if (e.message.indexOf('Error') < 0) {
      flashToast('Error de conexion: ' + e.message, true);
    }
  });
}

// Send button
document.getElementById('uSend').addEventListener('click', function() {
  var inp = document.getElementById('uInput');
  var text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  processCommand(text);
});
document.getElementById('uInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') { e.preventDefault(); document.getElementById('uSend').click(); }
});

// ===== INIT =====
load();
updateUserBtn();
badges();
renderDesp();
</script>
