<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffffff">
<title>Despensa Familiar</title>
<link rel="apple-touch-icon" href="manolo.jpeg">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F5F4F0;--white:#fff;--gray100:#f0f0ec;--gray200:#e0dfdb;--gray300:#c8c7c3;
  --gray500:#8a8985;--gray700:#4a4945;--gray900:#1a1a18;
  --ok:#1A7A4A;--ok-bg:#e8f5ee;--low:#D46000;--low-bg:#fef3e8;--empty:#C8002E;--empty-bg:#fce8ed;
  --accent:#2563EB;--accent-bg:#eff6ff;
  --verde:#2D8B4E;--verde-bg:#eaf6ee;
  --pupe:#7C6BC4;--pupe-bg:#f0ecfa;
  --uber:#06C167;--uber-bg:#e6f9ef;
  --impulso:#E91E8C;--impulso-bg:#fde8f4;--evento:#7C3AED;--evento-bg:#f0e8fd;
  --radius:10px;--radius-sm:7px;--shadow:0 1px 3px rgba(0,0,0,.05);
  --tab-h:54px;--header-h:48px;
  --safe-b:env(safe-area-inset-bottom,0px);
}
html{font-size:14px;-webkit-text-size-adjust:100%}
body{
  font-family:-apple-system,system-ui,'SF Pro Text',sans-serif;
  background:var(--bg);color:var(--gray900);
  min-height:100dvh;overflow-x:hidden;
  padding-bottom:calc(var(--tab-h) + var(--safe-b) + 4px);
  padding-top:var(--header-h);
  -webkit-font-smoothing:antialiased;
}
button,input,select,textarea{font-family:inherit;font-size:inherit;border:none;outline:none;background:none}
button{cursor:pointer;-webkit-tap-highlight-color:transparent}
input,textarea,select{-webkit-appearance:none;appearance:none}

/* HEADER */
.header{position:fixed;top:0;left:0;right:0;height:var(--header-h);background:var(--white);display:flex;align-items:center;gap:8px;padding:0 10px;z-index:100;border-bottom:1px solid var(--gray200)}
.header-avatar{width:30px;height:30px;border-radius:50%;overflow:hidden;border:2px solid var(--gray200);flex-shrink:0;background:var(--gray100)}
.header-avatar img{width:100%;height:100%;object-fit:contain;object-position:center}
.header-title{font-size:16px;font-weight:700;letter-spacing:-.3px;flex:1}
.header-user{display:flex;align-items:center;gap:5px;padding:3px 8px 3px 3px;border-radius:16px;background:var(--accent-bg);font-size:11px;color:var(--accent);font-weight:600}
.header-user .hu-av{width:22px;height:22px;border-radius:50%;overflow:hidden;background:var(--gray100)}
.header-user .hu-av img{width:100%;height:100%;object-fit:contain}

/* TAB BAR */
.tab-bar{position:fixed;bottom:0;left:0;right:0;height:calc(var(--tab-h) + var(--safe-b));background:var(--white);display:flex;align-items:flex-start;z-index:100;border-top:1px solid var(--gray200);padding-bottom:var(--safe-b)}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;font-size:9px;font-weight:600;color:var(--gray500);height:var(--tab-h);position:relative;letter-spacing:.2px}
.tab-btn.active{color:var(--accent)}
.tab-btn svg{width:19px;height:19px;fill:currentColor}
.tab-badge{position:absolute;top:2px;right:calc(50% - 15px);background:var(--empty);color:#fff;font-size:7px;min-width:13px;height:13px;border-radius:7px;display:flex;align-items:center;justify-content:center;padding:0 3px;font-weight:700}

/* VIEWS */
.view{display:none;padding:6px 8px 10px}
.view.active{display:block}

/* SUMMARY */
.summary-row{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:5px}
.summary-card{background:var(--white);border-radius:var(--radius-sm);padding:5px 3px;text-align:center;box-shadow:var(--shadow)}
.summary-card .num{font-size:16px;font-weight:800;line-height:1}
.summary-card .lbl{font-size:7px;color:var(--gray500);margin-top:1px;text-transform:uppercase;letter-spacing:.4px;font-weight:700}
.sc-total .num{color:var(--gray700)}.sc-ok .num{color:var(--ok)}.sc-low .num{color:var(--low)}.sc-empty .num{color:var(--empty)}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:4px}
.search-wrap input{width:100%;height:32px;background:var(--white);border-radius:16px;padding:0 30px 0 12px;font-size:13px;box-shadow:var(--shadow);border:1px solid var(--gray200)}
.search-wrap svg{position:absolute;right:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;fill:var(--gray500)}

/* SECTION HEADERS */
.sec-hdr{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:5px 4px 2px;color:var(--gray500);display:flex;align-items:center;gap:4px}
.sec-hdr .sh-n{font-size:8px;background:var(--gray200);color:var(--gray700);padding:0 5px;border-radius:6px;font-weight:700}
.sec-hdr.sh-verde{color:var(--verde)}.sec-hdr.sh-verde .sh-n{background:var(--verde-bg);color:var(--verde)}
.sec-hdr.sh-pupe{color:var(--pupe)}.sec-hdr.sh-pupe .sh-n{background:var(--pupe-bg);color:var(--pupe)}

/* 2-COL COMPACT GRID */
.p-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:3px;margin-bottom:2px}
@media(min-width:430px){.p-grid{grid-template-columns:repeat(3,1fr)}}

.p-cell{
  background:var(--white);border-radius:var(--radius-sm);padding:5px 6px;
  box-shadow:var(--shadow);display:flex;flex-direction:column;gap:1px;
  border-left:3px solid var(--ok);min-height:0;
}
.p-cell.st-low{border-left-color:var(--low);background:var(--low-bg)}
.p-cell.st-empty{border-left-color:var(--empty);background:var(--empty-bg)}
.p-cell.st-verde{border-left-color:var(--verde);background:var(--verde-bg)}
.p-cell.st-pupe{border-left-color:var(--pupe);background:var(--pupe-bg)}
.p-cell .pc-name{font-size:12px;font-weight:700;line-height:1.15;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.p-cell .pc-row{display:flex;align-items:center;justify-content:space-between;margin-top:auto}
.p-cell .pc-qty{font-size:15px;font-weight:800}
.p-cell .pc-unit{font-size:8px;color:var(--gray500);margin-left:1px}
.pc-qty.q-ok{color:var(--ok)}.pc-qty.q-low{color:var(--low)}.pc-qty.q-empty{color:var(--empty)}
.p-cell .pc-btns{display:flex;gap:2px}
.p-cell .pc-btn{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:var(--gray700);background:var(--gray100)}
.p-cell .pc-btn:active{background:var(--gray300)}
.p-cell.st-verde .pc-btn{background:rgba(45,139,78,.15)}
.p-cell.st-pupe .pc-btn{background:rgba(124,107,196,.15)}

/* FAB */
.fab{position:fixed;bottom:calc(var(--tab-h) + var(--safe-b) + 10px);right:12px;width:44px;height:44px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:300;box-shadow:0 3px 12px rgba(37,99,235,.35);z-index:90}
.fab:active{transform:scale(.92)}

/* MIC BUTTON */
.mic-fab{position:fixed;bottom:calc(var(--tab-h) + var(--safe-b) + 10px);right:62px;width:44px;height:44px;border-radius:50%;background:var(--gray900);color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 12px rgba(0,0,0,.25);z-index:90}
.mic-fab:active{transform:scale(.92)}
.mic-fab svg{width:22px;height:22px;fill:currentColor}
.mic-fab.recording{background:var(--empty);animation:mic-pulse 1s infinite}
.mic-fab.processing{background:var(--low);opacity:.7}
@keyframes mic-pulse{0%,100%{box-shadow:0 0 0 0 rgba(200,0,46,.4)}50%{box-shadow:0 0 0 10px rgba(200,0,46,0)}}
.mic-label{position:fixed;bottom:calc(var(--tab-h) + var(--safe-b) + 58px);right:12px;font-size:10px;color:var(--gray500);font-weight:600;z-index:90;text-align:right;display:none}
.mic-label.show{display:block}

/* FALTAN */
.fi-row{display:flex;align-items:center;gap:6px;padding:5px 8px;background:var(--white);border-bottom:1px solid var(--gray100)}
.fi-row:first-child{border-radius:var(--radius-sm) var(--radius-sm) 0 0}
.fi-row:last-child{border-bottom:none;border-radius:0 0 var(--radius-sm) var(--radius-sm)}
.fi-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.fi-dot.dot-empty{background:var(--empty)}.fi-dot.dot-low{background:var(--low)}
.fi-row .fi-name{font-size:12px;font-weight:600;flex:1}
.fi-row .fi-info{font-size:10px;color:var(--gray500)}
.fi-row .fi-btn{padding:3px 8px;border-radius:8px;font-size:10px;font-weight:700;background:var(--ok);color:#fff;flex-shrink:0}
.faltan-title{font-size:11px;font-weight:700;margin:6px 0 3px;padding:2px 6px;border-radius:5px;display:inline-block}
.ft-empty{background:var(--empty-bg);color:var(--empty)}.ft-low{background:var(--low-bg);color:var(--low)}
.faltan-empty{text-align:center;padding:30px;color:var(--gray500);font-size:13px}

/* PEDIDOS */
.pedido-group{margin-bottom:10px}
.pg-hdr{display:flex;align-items:center;gap:6px;margin-bottom:3px;padding:0 2px}
.pg-hdr .pg-av{width:24px;height:24px;border-radius:50%;overflow:hidden;background:var(--gray100)}
.pg-hdr .pg-av img{width:100%;height:100%;object-fit:contain}
.pg-hdr span{font-size:12px;font-weight:700;color:var(--accent)}
.ped-row{display:flex;align-items:center;gap:6px;padding:6px 8px;background:var(--white);border-bottom:1px solid var(--gray100)}
.ped-row:first-of-type{border-radius:var(--radius-sm) var(--radius-sm) 0 0}
.ped-row:last-of-type{border-bottom:none;border-radius:0 0 var(--radius-sm) var(--radius-sm)}
.ped-row.comprado{opacity:.35}
.ped-ck{width:22px;height:22px;border-radius:50%;border:2px solid var(--gray300);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.ped-ck.checked{background:var(--ok);border-color:var(--ok);color:#fff}
.ped-ck svg{width:13px;height:13px;fill:currentColor}
.ped-body{flex:1;min-width:0}
.ped-txt{font-size:12px;font-weight:600}
.ped-meta{font-size:9px;color:var(--gray500)}
.ped-del{font-size:15px;color:var(--gray500);padding:3px}

/* CHIPS */
.chips{display:flex;gap:4px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:1px 0 5px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{white-space:nowrap;padding:4px 10px;border-radius:12px;font-size:11px;font-weight:600;background:var(--white);color:var(--gray700);border:1px solid var(--gray200);flex-shrink:0}
.chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.chip-av{width:16px;height:16px;border-radius:50%;overflow:hidden;vertical-align:middle;margin-right:2px;display:inline-block;background:var(--gray100)}
.chip-av img{width:100%;height:100%;object-fit:contain}

/* COMPRAS */
.compra-reg{width:100%;padding:10px;border-radius:var(--radius);font-size:13px;font-weight:700;background:var(--uber);color:#fff;text-align:center;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:6px}
.compra-reg:active{opacity:.85}
.compra-card{background:var(--white);border-radius:var(--radius-sm);padding:8px 10px;margin-bottom:4px;box-shadow:var(--shadow)}
.compra-header{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.compra-tienda{font-size:12px;font-weight:700;flex:1}
.compra-tipo{font-size:8px;font-weight:700;padding:2px 6px;border-radius:6px}
.tipo-abastecimiento{background:var(--accent-bg);color:var(--accent)}.tipo-ajuste{background:var(--low-bg);color:var(--low)}
.tipo-impulso{background:var(--impulso-bg);color:var(--impulso)}.tipo-evento{background:var(--evento-bg);color:var(--evento)}
.compra-fecha{font-size:9px;color:var(--gray500)}
.compra-prods{font-size:10px;color:var(--gray700);margin-top:2px;line-height:1.5}
.compra-prods span{background:var(--gray100);padding:0 4px;border-radius:3px;margin-right:2px;display:inline-block;margin-bottom:1px}
.compra-user{font-size:9px;color:var(--gray500);margin-top:2px}

/* CHAT */
.chat-messages{display:flex;flex-direction:column;gap:6px;min-height:200px;padding-bottom:64px}
.chat-bubble{max-width:85%;padding:8px 12px;border-radius:14px;font-size:13px;line-height:1.35;word-break:break-word}
.chat-bubble.user{background:var(--accent);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.chat-bubble.assistant{background:var(--white);color:var(--gray900);align-self:flex-start;border-bottom-left-radius:4px;box-shadow:var(--shadow)}
.chat-action{background:var(--ok-bg);border-radius:6px;padding:4px 8px;margin-top:4px;font-size:10px;color:var(--ok);font-weight:600}
.chat-action.action-pedido{background:var(--accent-bg);color:var(--accent)}
.chat-action.action-compra{background:var(--uber-bg);color:var(--uber)}
.chat-action.action-warn{background:var(--low-bg);color:var(--low)}
.chat-input-wrap{position:fixed;bottom:calc(var(--tab-h) + var(--safe-b));left:0;right:0;padding:6px 10px;background:var(--bg);border-top:1px solid var(--gray200);display:none;z-index:90}
.chat-input-wrap.visible{display:flex;gap:6px;align-items:center}
.chat-input{flex:1;height:38px;border-radius:19px;background:var(--white);padding:0 14px;border:1px solid var(--gray200);font-size:13px}
.chat-mic{width:38px;height:38px;border-radius:50%;background:var(--gray900);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.chat-mic.recording{background:var(--empty);animation:mic-pulse 1s infinite}
.chat-mic.processing{background:var(--low);opacity:.7}
.chat-mic svg{width:18px;height:18px;fill:currentColor}
.chat-send{width:38px;height:38px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.chat-send:active{opacity:.8}
.chat-send svg{width:16px;height:16px;fill:currentColor}

/* CONFIG */
.config-section{margin-bottom:14px}
.config-section h3{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--gray500);margin-bottom:5px}
.config-row{background:var(--white);border-radius:var(--radius-sm);padding:8px 10px;margin-bottom:4px;box-shadow:var(--shadow);display:flex;align-items:center;gap:8px}
.config-row label{flex:1;font-size:12px;font-weight:600}
.config-row input[type="text"],.config-row input[type="password"]{flex:1;height:32px;border-radius:6px;background:var(--gray100);padding:0 8px;font-size:12px}
.config-row .toggle{width:40px;height:24px;border-radius:12px;background:var(--gray300);position:relative;transition:background .2s;flex-shrink:0}
.config-row .toggle.on{background:var(--ok)}
.config-row .toggle::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
.config-row .toggle.on::after{transform:translateX(16px)}
.config-btn{width:100%;padding:10px;border-radius:var(--radius-sm);font-size:12px;font-weight:700;text-align:center;margin-bottom:4px}
.config-btn.primary{background:var(--accent);color:#fff}.config-btn.danger{background:var(--empty-bg);color:var(--empty)}.config-btn.secondary{background:var(--gray100);color:var(--gray700)}
.config-btn:active{opacity:.8}
.family-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px}
.family-member{display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 3px;background:var(--white);border-radius:var(--radius-sm);box-shadow:var(--shadow);position:relative}
.family-member .fm-av{width:40px;height:40px;border-radius:50%;overflow:hidden;background:var(--gray100)}
.family-member .fm-av img{width:100%;height:100%;object-fit:contain}
.family-member .fm-name{font-size:10px;font-weight:700}
.family-member .fm-del{position:absolute;top:2px;right:4px;font-size:13px;color:var(--gray500)}
.family-add{display:flex;gap:5px}
.family-add input{flex:1;height:30px;border-radius:6px;background:var(--gray100);padding:0 8px;font-size:12px}
.family-add button{padding:0 12px;border-radius:6px;background:var(--accent);color:#fff;font-size:12px;font-weight:700}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--white);border-radius:18px 18px 0 0;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;padding:16px 14px calc(14px + var(--safe-b))}
.modal h2{font-size:15px;font-weight:700;margin-bottom:12px;text-align:center}
.modal-field{margin-bottom:8px}
.modal-field label{display:block;font-size:10px;font-weight:600;color:var(--gray500);margin-bottom:2px;text-transform:uppercase;letter-spacing:.3px}
.modal-field input,.modal-field select{width:100%;height:38px;border-radius:8px;background:var(--gray100);padding:0 10px;font-size:13px}
.modal-actions{display:flex;gap:6px;margin-top:12px}
.modal-actions button{flex:1;height:40px;border-radius:10px;font-size:13px;font-weight:700}
.modal-actions .btn-save{background:var(--accent);color:#fff}
.modal-actions .btn-cancel{background:var(--gray100);color:var(--gray700)}
.modal-actions .btn-delete{background:var(--empty-bg);color:var(--empty)}
.ci-list{margin:4px 0;max-height:140px;overflow-y:auto}
.ci-row{display:flex;align-items:center;gap:5px;padding:4px 6px;background:var(--gray100);border-radius:6px;margin-bottom:2px;font-size:12px}
.ci-row .ci-n{flex:1;font-weight:600}.ci-row .ci-q{font-weight:700;width:30px;text-align:center}.ci-row .ci-d{color:var(--empty);font-size:14px}
.ci-add{display:flex;gap:4px;margin-bottom:4px}
.ci-add input{flex:1;height:34px;border-radius:6px;background:var(--gray100);padding:0 8px;font-size:12px}
.ci-add input:last-of-type{width:44px;flex:none;text-align:center}
.ci-add button{padding:0 10px;border-radius:6px;background:var(--uber);color:#fff;font-weight:700}
.rv-item{display:flex;align-items:center;gap:6px;padding:6px;background:var(--gray100);border-radius:6px;margin-bottom:4px}
.rv-item .rv-n{flex:1;font-size:12px;font-weight:600}.rv-item .rv-q{font-size:10px;color:var(--gray500)}
.rv-item select{height:28px;border-radius:5px;background:var(--white);padding:0 4px;font-size:10px;font-weight:600;border:1px solid var(--gray200)}
.empty-state{text-align:center;padding:30px;color:var(--gray500);font-size:13px}
</style>
</head>
<body>

<header class="header">
  <div class="header-avatar"><img src="manolo.jpeg" alt="" onerror="this.parentElement.style.display='none'"></div>
  <span class="header-title">Despensa Familiar</span>
  <button class="header-user" id="currentUserBtn"><span class="hu-av"><img src="avatar-pablo.png" alt=""></span>Pablo</button>
</header>

<nav class="tab-bar">
  <button class="tab-btn active" data-tab="despensa"><svg viewBox="0 0 24 24"><path d="M3 13h1v7c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2v-7h1a1 1 0 0 0 .7-1.7l-9-9a1 1 0 0 0-1.4 0l-9 9A1 1 0 0 0 3 13z"/></svg>Despensa</button>
  <button class="tab-btn" data-tab="faltan"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15v-2h2v2h-2zm0-4V7h2v6h-2z"/></svg><span class="tab-badge" id="faltanBadge">0</span>Faltan</button>

function save(){localStorage.setItem('despensa_v31',JSON.stringify(state));}
function load(){const d=localStorage.getItem('despensa_v31');if(d){try{state=JSON.parse(d);if(!state.compras)state.compras=[];if(!state.config.apiKey)state.config.apiKey=BUILTIN_KEY;}catch(e){seedData();}}else seedData();}
function getStatus(p){return p.cantidadActual<=0?'empty':p.cantidadActual<p.stockMinimo?'low':'ok';}
function nextId(a){return a.length?Math.max(...a.map(x=>x.id))+1:1;}
function sectionFor(p){if(p.pupe)return'Pupe';return SECTION_MAP[p.categoria]||'Otro';}
function getKey(){return state.config.apiKey||BUILTIN_KEY;}

// TABS
let activeTab='despensa';
document.querySelectorAll('.tab-btn').forEach(b=>b.addEventListener('click',()=>{
  activeTab=b.dataset.tab;
  document.querySelectorAll('.tab-btn').forEach(x=>x.classList.toggle('active',x.dataset.tab===activeTab));
  document.querySelectorAll('.view').forEach(v=>v.classList.toggle('active',v.id==='view-'+activeTab));
  document.getElementById('chatInputWrap').classList.toggle('visible',activeTab==='comando');
  document.getElementById('addProductFab').style.display=activeTab==='despensa'?'':'none';
  document.getElementById('addPedidoFab').style.display=activeTab==='pedidos'?'':'none';
  document.getElementById('pedidosMic').style.display=activeTab==='pedidos'?'':'none';
  renderTab(activeTab);
}));

// ===== DESPENSA: 2-COL COMPACT GRID =====
let searchQ='';
function renderDespensa(){
  const all=state.productos,t=all.length,ok=all.filter(p=>getStatus(p)==='ok').length,lo=all.filter(p=>getStatus(p)==='low').length,em=all.filter(p=>getStatus(p)==='empty').length;
  document.getElementById('summaryCards').innerHTML=`<div class="summary-card sc-total"><div class="num">${t}</div><div class="lbl">Total</div></div><div class="summary-card sc-ok"><div class="num">${ok}</div><div class="lbl">OK</div></div><div class="summary-card sc-low"><div class="num">${lo}</div><div class="lbl">Bajo</div></div><div class="summary-card sc-empty"><div class="num">${em}</div><div class="lbl">Sin Stock</div></div>`;
  let prods=searchQ?all.filter(p=>p.nombre.toLowerCase().includes(searchQ.toLowerCase())):[...all];
  const groups={};prods.forEach(p=>{const s=sectionFor(p);if(!groups[s])groups[s]=[];groups[s].push(p);});
  const ord={empty:0,low:1,ok:2};for(const k in groups)groups[k].sort((a,b)=>ord[getStatus(a)]-ord[getStatus(b)]);
  const el=document.getElementById('productList');
  if(!prods.length){el.innerHTML='<div class="empty-state"><p>No hay productos</p></div>';return;}
  let html='';
  for(const sec of SECTION_ORDER){
    const items=groups[sec];if(!items||!items.length)continue;
    const isV=sec==='Frutas y Verduras',isP=sec==='Pupe';
    html+=`<div class="sec-hdr ${isV?'sh-verde':isP?'sh-pupe':''}">${sec} <span class="sh-n">${items.length}</span></div><div class="p-grid">`;
    html+=items.map(p=>{
      const st=getStatus(p);
      let cls='';if(st==='empty')cls='st-empty';else if(st==='low')cls='st-low';else if(isV)cls='st-verde';else if(isP)cls='st-pupe';
      return `<div class="p-cell ${cls}" data-id="${p.id}"><div class="pc-name">${p.nombre}</div><div class="pc-row"><div><span class="pc-qty q-${st}">${p.cantidadActual}</span><span class="pc-unit">${p.unidad}</span></div><span class="pc-btns"><button class="pc-btn" data-a="m" data-id="${p.id}">-</button><button class="pc-btn" data-a="p" data-id="${p.id}">+</button></span></div></div>`;
    }).join('');
    html+='</div>';
  }
  el.innerHTML=html;
  el.querySelectorAll('.pc-btn').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();const p=state.productos.find(x=>x.id===+b.dataset.id);if(!p)return;if(b.dataset.a==='p')p.cantidadActual++;else if(p.cantidadActual>0)p.cantidadActual--;p.ultimaActualizacion=new Date().toISOString();p.actualizadoPor=state.config.activeUser;save();renderDespensa();updateBadges();}));

// FALTAN
function renderFaltan(){
  const emp=state.productos.filter(p=>getStatus(p)==='empty'),low=state.productos.filter(p=>getStatus(p)==='low'),el=document.getElementById('faltanList');
  if(!emp.length&&!low.length){el.innerHTML='<div class="faltan-empty">Todo OK!</div>';return;}
  const ri=(p,d)=>`<div class="fi-row"><span class="fi-dot dot-${d}"></span><span class="fi-name">${p.nombre}</span><span class="fi-info">${p.cantidadActual}/${p.stockMinimo}</span><button class="fi-btn" data-id="${p.id}">+</button></div>`;
  let h='';
  if(emp.length)h+=`<div class="faltan-title ft-empty">Sin Stock (${emp.length})</div>${emp.map(p=>ri(p,'empty')).join('')}`;
  if(low.length)h+=`<div class="faltan-title ft-low">Bajo (${low.length})</div>${low.map(p=>ri(p,'low')).join('')}`;
  el.innerHTML=h;
  el.querySelectorAll('.fi-btn').forEach(b=>b.addEventListener('click',()=>{const p=state.productos.find(x=>x.id===+b.dataset.id);if(p){p.cantidadActual=p.stockMinimo;p.ultimaActualizacion=new Date().toISOString();p.actualizadoPor=state.config.activeUser;save();renderFaltan();updateBadges();}}));
}

// PEDIDOS
let pedF='Todos';
function renderPedidos(){
  const per=['Todos',...state.config.familia];
  document.getElementById('pedidoChips').innerHTML=per.map(p=>{const a=p!=='Todos'?`<span class="chip-av"><img src="${avatarFor(p)}"></span>`:'';return`<button class="chip ${p===pedF?'active':''}" data-p="${p}">${a}${p}</button>`;}).join('');
  document.querySelectorAll('#pedidoChips .chip').forEach(c=>c.addEventListener('click',()=>{pedF=c.dataset.p;renderPedidos();}));
  let peds=[...state.pedidos];if(pedF!=='Todos')peds=peds.filter(p=>p.solicitadoPor===pedF);
  const el=document.getElementById('pedidosList');if(!peds.length){el.innerHTML='<div class="empty-state"><p>No hay pedidos</p></div>';return;}
  const g={};peds.forEach(p=>{if(!g[p.solicitadoPor])g[p.solicitadoPor]=[];g[p.solicitadoPor].push(p);});
  let h='';for(const[per,items]of Object.entries(g)){
    items.sort((a,b)=>(a.estado==='comprado'?1:0)-(b.estado==='comprado'?1:0));
    h+=`<div class="pedido-group"><div class="pg-hdr"><span class="pg-av"><img src="${avatarFor(per)}"></span><span>${per}</span></div>`;
    h+=items.map(p=>`<div class="ped-row ${p.estado==='comprado'?'comprado':''}"><button class="ped-ck ${p.estado==='comprado'?'checked':''}" data-id="${p.id}">${p.estado==='comprado'?'<svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>':''}</button><div class="ped-body"><div class="ped-txt">${p.texto}${p.cantidad>1?' x'+p.cantidad:''}</div><div class="ped-meta">${p.comentario?p.comentario+' — ':''}${new Date(p.fecha).toLocaleDateString('es-CL')}</div></div><button class="ped-del" data-d="${p.id}">&times;</button></div>`).join('');
    h+='</div>';
  }
  el.innerHTML=h;
  el.querySelectorAll('.ped-ck').forEach(b=>b.addEventListener('click',()=>{const p=state.pedidos.find(x=>x.id===+b.dataset.id);if(p){p.estado=p.estado==='comprado'?'pendiente':'comprado';save();renderPedidos();updateBadges();}}));
  el.querySelectorAll('.ped-del').forEach(b=>b.addEventListener('click',()=>{state.pedidos=state.pedidos.filter(x=>x.id!==+b.dataset.d);save();renderPedidos();updateBadges();}));
}

// COMPRAS

// ===== VOICE / MICROPHONE =====
const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
let recognition=null,micTarget=null;

function initSpeech(){
  if(!SpeechRecognition)return null;
  const r=new SpeechRecognition();
  r.lang='es-CL';r.continuous=false;r.interimResults=false;
  r.onresult=e=>{
    const text=e.results[0][0].transcript;
    if(micTarget==='comando'){document.getElementById('chatInput').value=text;processCommand(text);}
    else if(micTarget==='pedidos'){processCommand(text);}// same IA handles both
    stopMicUI();
  };
  r.onerror=()=>stopMicUI();
  r.onend=()=>stopMicUI();
  return r;
}

function startMic(target,btnEl){
  if(!recognition)recognition=initSpeech();
  if(!recognition){alert('Tu navegador no soporta reconocimiento de voz. Usa el dictado del teclado.');return;}
  micTarget=target;
  try{recognition.start();btnEl.classList.add('recording');}catch(e){}
}
function stopMicUI(){
  document.getElementById('chatMic').classList.remove('recording','processing');
  document.getElementById('pedidosMic').classList.remove('recording','processing');
}

document.getElementById('chatMic').addEventListener('click',function(){
  if(this.classList.contains('recording')){recognition?.stop();return;}
  startMic('comando',this);
});
document.getElementById('pedidosMic').addEventListener('click',function(){
  if(this.classList.contains('recording')){recognition?.stop();return;}
  startMic('pedidos',this);
});

// ===== CHAT IA =====
function addChat(t,r,acts){const d=document.createElement('div');d.className=`chat-bubble ${r}`;d.innerHTML=t;if(acts)acts.forEach(a=>{const ad=document.createElement('div');ad.className=`chat-action ${a.type==='pedido'?'action-pedido':a.type==='compra'?'action-compra':a.type==='warn'?'action-warn':''}`;ad.textContent=a.label;d.appendChild(ad);});document.getElementById('chatMessages').appendChild(d);document.getElementById('chatMessages').scrollTop=9e9;}

async function processCommand(text){
  addChat(text,'user');
  const key=getKey();if(!key){addChat('Falta API Key. Ve a Config.','assistant');return;}
  const inv=state.productos.map(p=>`${p.nombre}(${p.categoria}${p.pupe?',pupe':''}):${p.cantidadActual}${p.unidad},min${p.stockMinimo}`).join('\n');
  const sys=`Eres asistente de despensa familiar chilena. Familia:${state.config.familia.join(',')}. Usuario:${state.config.activeUser}.
Inventario:\n${inv}\nREGLAS: Verduras/frutas=feria. Resto=Uber Eats. Pupe=intolerante lactosa.
Responde SOLO JSON: {"acciones":[...],"respuesta":"texto"}
Tipos: actualizar(producto,cantidad), pedido(texto,solicitadoPor,cantidad,comentario), crear(nombre,categoria,unidad,cantidad,stockMinimo,pupe), compra(tienda,tipoc,productos[{nombre,cantidad}])
Solo JSON.`;
  try{
    const r=await fetch('https://api.openai.com/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},body:JSON.stringify({model:'gpt-4o-mini',messages:[{role:'system',content:sys},{role:'user',content:text}],temperature:.3,max_tokens:600})});
    if(!r.ok){const e=await r.json().catch(()=>({}));addChat(`Error: ${e.error?.message||r.status}`,'assistant');return;}
    const data=await r.json(),raw=data.choices?.[0]?.message?.content||'';
    let parsed;try{parsed=JSON.parse(raw.replace(/```json?\n?/g,'').replace(/```/g,'').trim());}catch(e){addChat('No pude interpretar.','assistant');return;}
    const labels=[];
    if(parsed.acciones)for(const a of parsed.acciones){
      if(a.tipo==='actualizar'){const p=state.productos.find(x=>x.nombre.toLowerCase()===a.producto?.toLowerCase());if(p){p.cantidadActual=Math.max(0,a.cantidad);p.ultimaActualizacion=new Date().toISOString();p.actualizadoPor=state.config.activeUser;labels.push({label:`${p.nombre} → ${a.cantidad}`,type:'update'});}else labels.push({label:`"${a.producto}" no encontrado`,type:'warn'});}
      else if(a.tipo==='pedido'){state.pedidos.push({id:nextId(state.pedidos),texto:a.texto,cantidad:a.cantidad||1,solicitadoPor:a.solicitadoPor||state.config.activeUser,comentario:a.comentario||'',fecha:new Date().toISOString(),estado:'pendiente'});labels.push({label:`Pedido: ${a.texto} (${a.solicitadoPor||state.config.activeUser})`,type:'pedido'});}
      else if(a.tipo==='crear'){state.productos.push({id:nextId(state.productos),nombre:a.nombre,categoria:a.categoria||'Otro',unidad:a.unidad||'un',cantidadActual:a.cantidad||0,stockMinimo:a.stockMinimo||1,pupe:!!a.pupe,ultimaActualizacion:new Date().toISOString(),actualizadoPor:state.config.activeUser});labels.push({label:`Nuevo: ${a.nombre}`,type:'update'});}
      else if(a.tipo==='compra'){const c={id:nextId(state.compras),fecha:new Date().toISOString(),tienda:a.tienda||'Uber Eats',tipo:a.tipoc||'abastecimiento',productos:(a.productos||[]).map(x=>({nombre:x.nombre,cantidad:x.cantidad||1})),registradoPor:state.config.activeUser};state.compras.push(c);for(const cp of c.productos){const ep=state.productos.find(x=>x.nombre.toLowerCase()===cp.nombre.toLowerCase());if(ep){ep.cantidadActual+=cp.cantidad;ep.ultimaActualizacion=new Date().toISOString();ep.actualizadoPor=state.config.activeUser;}}labels.push({label:`Compra: ${c.tienda} (${c.productos.length})`,type:'compra'});}
    }
    save();updateBadges();addChat(parsed.respuesta||'Listo!','assistant',labels);
  }catch(e){addChat('Error de conexion.','assistant');}
}
document.getElementById('chatSend').addEventListener('click',()=>{const i=document.getElementById('chatInput'),t=i.value.trim();if(!t)return;i.value='';processCommand(t);});
document.getElementById('chatInput').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();document.getElementById('chatSend').click();}});

load();
// Ensure API key is set
if(!state.config.apiKey){state.config.apiKey=BUILTIN_KEY;save();}
updateUserBtn();updateBadges();renderDespensa();
</script>
